<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revomac Production Report</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f4f6f8;margin:0;padding:20px;color:#1e293b}

/* FILTER */
.filter{display:flex;gap:10px;margin-bottom:20px}
input,select,button{padding:8px;border-radius:6px;border:1px solid #cbd5e1}
button{background:#2D8A6D;color:#fff;border:none;cursor:pointer}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.kpi{background:#fff;border-radius:14px;padding:16px;box-shadow:0 6px 14px rgba(0,0,0,0.05);border-top:4px solid #2D8A6D}
.kpi-title{font-size:13px;color:#64748b}
.kpi-value{font-size:26px;font-weight:700;margin-top:6px}

/* PERFORMANCE */
.section-title{margin:20px 0 10px;font-weight:600}
.perf-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.perf-card{background:#fff;border-radius:16px;padding:20px;text-align:center;box-shadow:0 6px 14px rgba(0,0,0,0.05)}

/* TABLE */
.table-card{background:#fff;border-radius:16px;padding:20px;margin-top:20px}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;padding:10px}
td{padding:10px;text-align:center;border-bottom:1px solid #e5e7eb}
tr:hover{background:#f9fafb}

/* CHART */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.chart-card{background:#fff;border-radius:16px;padding:20px}
</style>
</head>

<body>

<!-- FILTER -->
<div class="filter">
<input type="date" id="date">
<select id="shift">
<option>A</option>
<option>B</option>
<option>C</option>
<option>Full Day</option>
</select>
<button onclick="generate()">Generate</button>
</div>

<!-- KPI -->
<div class="kpi-row">
<div class="kpi"><div class="kpi-title">Total Bricks Produced</div><div id="production" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Runtime (min)</div><div id="runtime" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Downtime (min)</div><div id="downtime" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Idle Time (min)</div><div id="idle" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Energy (kWh)</div><div id="energy" class="kpi-value">0</div></div>
</div>

<!-- PERFORMANCE -->
<div class="section-title">Performance Metrics</div>
<div class="perf-row">
<div class="perf-card"><div id="perf"></div><div>Performance</div></div>
<div class="perf-card"><div id="avail"></div><div>Availability</div></div>
<div class="perf-card"><div id="qual"></div><div>Quality</div></div>
<div class="perf-card"><div id="oeeChart"></div><div>OEE</div></div>
</div>

<!-- TABLE -->
<div class="section-title">Hourly Production Table</div>
<div class="table-card">
<table>
<thead>
<tr>
<th>Time</th>
<th>Production (Nos)</th>
<th>Runtime</th>
<th>Downtime</th>
<th>Idle</th>
<th>Energy</th>
<th>Performance (%)</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- CHART -->
<div class="chart-row">
<div class="chart-card"><div id="prodChart"></div></div>
<div class="chart-card"><div id="energyChart"></div></div>
</div>

<script>

const DEVICE_ID="34195550-2103-11f1-92b2-1da25bcc708d";
const API="https://plantwiz.pimateck.in/api";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Production_Hourly",
"Consumption_Hourly",
"Runtime_Hourly",
"Downtime_Hourly",
"Idletime_Hourly",
"Oee_Hourly",
"Performance_Hourly",
"Availability_Hourly",
"Quality_Hourly"
];

function num(v){return Number(v)||0}

/* IST SHIFT FUNCTION */
function getShiftRange(dateStr, shift){
const baseIST=new Date(dateStr+"T00:00:00+05:30")
const addHrs=(h)=>new Date(baseIST.getTime()+h*3600000)

let s,e
if(shift==="A"){s=addHrs(0);e=addHrs(8)}
else if(shift==="B"){s=addHrs(8);e=addHrs(16)}
else if(shift==="C"){s=addHrs(16);e=addHrs(24)}
else{s=addHrs(0);e=addHrs(24)}

return {startTs:s.getTime(),endTs:e.getTime()-1}
}

async function generate(){

const date=document.getElementById("date").value
const shift=document.getElementById("shift").value

if(!date){alert("Select Date");return}

const {startTs,endTs}=getShiftRange(date,shift)

const res=await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${startTs}&endTs=${endTs}&limit=1000`,{
headers:{"X-Authorization":"Bearer "+TOKEN}
})

const data=await res.json()

let map={}
Object.entries(data).forEach(([k,arr])=>{
arr.forEach(p=>{
if(!map[p.ts])map[p.ts]={ts:p.ts}
map[p.ts][k]=num(p.value)
})
})

const rows=Object.values(map).sort((a,b)=>a.ts-b.ts)

/* RESET */
table.innerHTML=""

/* KPI */
let prod=0,run=0,down=0,idleT=0,energy=0
rows.forEach(r=>{
prod+=r.Production_Hourly||0
run+=r.Runtime_Hourly||0
down+=r.Downtime_Hourly||0
idleT+=r.Idletime_Hourly||0
energy+=r.Consumption_Hourly||0
})

production.innerText=prod.toFixed(0)
runtime.innerText=run.toFixed(1)
downtime.innerText=down.toFixed(1)
idle.innerText=idleT.toFixed(1)
energy.innerText=energy.toFixed(1)

/* TABLE */
rows.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${new Date(r.ts).toLocaleTimeString("en-IN")}</td>
<td>${r.Production_Hourly||0}</td>
<td>${r.Runtime_Hourly||0}</td>
<td>${r.Downtime_Hourly||0}</td>
<td>${r.Idletime_Hourly||0}</td>
<td>${r.Consumption_Hourly||0}</td>
<td>${r.Performance_Hourly||0}%</td>
</tr>`
})

/* DONUT */
function donut(id,val){
let color=val>85?"#22c55e":val>60?"#f59e0b":"#ef4444"
Plotly.newPlot(id,[{
values:[val,100-val],
type:"pie",
hole:.7,
marker:{colors:[color,"#e5e7eb"]},
textinfo:"none"
}],{
annotations:[{text:val+"%",showarrow:false,font:{size:20}}],
showlegend:false,
margin:{t:10,b:10,l:10,r:10}
})
}

const avg=k=>rows.length?rows.reduce((s,r)=>s+num(r[k]),0)/rows.length:0

donut("perf",avg("Performance_Hourly").toFixed(1))
donut("avail",avg("Availability_Hourly").toFixed(1))
donut("qual",avg("Quality_Hourly").toFixed(1))
donut("oeeChart",avg("Oee_Hourly").toFixed(1))

/* CHARTS */
Plotly.newPlot("prodChart",[{
x:rows.map(r=>new Date(r.ts)),
y:rows.map(r=>r.Production_Hourly),
mode:"lines+markers",
line:{color:"#2D8A6D",width:3}
}],{title:"Production Trend"})

Plotly.newPlot("energyChart",[{
x:rows.map(r=>new Date(r.ts)),
y:rows.map(r=>r.Consumption_Hourly),
mode:"lines+markers",
line:{color:"#f59e0b",width:3}
}],{title:"Energy Trend"})

}

/* AUTO SELECT TODAY */
document.getElementById("date").value=new Date().toISOString().split("T")[0]

</script>

</body>
</html>
