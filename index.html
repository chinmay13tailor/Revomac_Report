<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revomac Production Report</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Segoe UI;
background:#eef2f6;
margin:0;
}

/* FILTER FULL WIDTH */
.filter-wrapper{
padding:20px;
}

.filter-box{
background:#ffffff;
border-radius:14px;
padding:16px 20px;
box-shadow:0 6px 14px rgba(0,0,0,0.06);

display:flex;
justify-content:space-between;
align-items:flex-end;
width:100%;
}

.filter-left{
display:flex;
gap:20px;
}

.filter-item{
display:flex;
flex-direction:column;
gap:4px;
}

.filter-item label{
font-size:12px;
color:#64748b;
font-weight:600;
}

.filter-item input,
.filter-item select{
padding:8px 10px;
border-radius:8px;
border:1px solid #cbd5e1;
background:#f8fafc;
}

.filter-actions{
display:flex;
gap:10px;
}

.filter-actions button{
padding:8px 16px;
border-radius:8px;
border:none;
background:#2D8A6D;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* REPORT */
.page{padding:20px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.kpi{
background:#fff;border-radius:14px;padding:16px;
box-shadow:0 6px 14px rgba(0,0,0,0.05);
border-top:4px solid #2D8A6D;
}
.kpi-title{font-size:13px;color:#64748b}
.kpi-value{font-size:26px;font-weight:700}

/* SECTION */
.section-title{margin:25px 0 10px;font-weight:600}

/* PERFORMANCE */
.perf-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.perf-card{
background:#fff;border-radius:16px;padding:16px;
box-shadow:0 6px 14px rgba(0,0,0,0.05);
position:relative;
display:flex;justify-content:center;align-items:center;
}
.perf-title{
position:absolute;top:12px;left:16px;
font-size:13px;color:#64748b;font-weight:600;
}
.perf-chart{height:140px}

/* TABLE */
.table-card{background:#fff;border-radius:16px;padding:20px;margin-top:20px}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;padding:10px}
td{padding:10px;text-align:center;border-bottom:1px solid #e5e7eb}

/* CHART */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.chart-card{background:#fff;border-radius:16px;padding:20px}
</style>
</head>

<body>

<!-- FILTER -->
<div class="filter-wrapper">
  <div class="filter-box">

    <div class="filter-left">
      <div class="filter-item">
        <label>Date</label>
        <input type="date" id="date">
      </div>

      <div class="filter-item">
        <label>Shift</label>
        <select id="shift">
          <option>A</option>
          <option>B</option>
          <option>C</option>
          <option>Full Day</option>
        </select>
      </div>
    </div>

    <div class="filter-actions">
      <button onclick="generate()">Generate</button>
      <button onclick="downloadPDF()">Export PDF</button>
    </div>

  </div>
</div>

<!-- REPORT -->
<div class="page" id="report">

<!-- KPI -->
<div class="kpi-row">
<div class="kpi"><div class="kpi-title">Total Bricks Produced</div><div id="production" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Runtime</div><div id="runtime" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Downtime</div><div id="downtime" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Idle Time</div><div id="idle" class="kpi-value">0</div></div>
<div class="kpi"><div class="kpi-title">Energy</div><div id="energy" class="kpi-value">0</div></div>
</div>

<!-- PERFORMANCE -->
<div class="section-title">Performance Metrics</div>
<div class="perf-row">
<div class="perf-card"><div class="perf-title">Performance</div><div id="perf" class="perf-chart"></div></div>
<div class="perf-card"><div class="perf-title">Availability</div><div id="avail" class="perf-chart"></div></div>
<div class="perf-card"><div class="perf-title">Quality</div><div id="qual" class="perf-chart"></div></div>
<div class="perf-card"><div class="perf-title">OEE</div><div id="oeeChart" class="perf-chart"></div></div>
</div>

<!-- TABLE -->
<div class="section-title">Hourly Production Table</div>
<div class="table-card">
<table>
<thead>
<tr>
<th>Time</th><th>Production</th><th>Runtime</th><th>Downtime</th><th>Idle</th><th>Energy</th><th>Performance</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- CHART -->
<div class="chart-row">
<div class="chart-card"><div id="prodChart"></div></div>
<div class="chart-card"><div id="energyChart"></div></div>
</div>

</div>

<script>

const DEVICE_ID="34195550-2103-11f1-92b2-1da25bcc708d";
const API="https://plantwiz.pimateck.in/api";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Production_Hourly","Consumption_Hourly","Runtime_Hourly",
"Downtime_Hourly","Idletime_Hourly","Oee_Hourly",
"Performance_Hourly","Availability_Hourly","Quality_Hourly"
];

function num(v){return Number(v)||0}

/* IST SHIFT */
function getShiftRange(dateStr, shift){
const base=new Date(dateStr+"T00:00:00+05:30")
const add=h=>new Date(base.getTime()+h*3600000)

let s,e
if(shift==="A"){s=add(0);e=add(8)}
else if(shift==="B"){s=add(8);e=add(16)}
else if(shift==="C"){s=add(16);e=add(24)}
else{s=add(0);e=add(24)}

return {startTs:s.getTime(),endTs:e.getTime()-1}
}

async function generate(){

const date=document.getElementById("date").value
const shift=document.getElementById("shift").value

if(!date){alert("Select Date");return}

const {startTs,endTs}=getShiftRange(date,shift)

const res=await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${startTs}&endTs=${endTs}&limit=1000`,
{headers:{"X-Authorization":"Bearer "+TOKEN}})

const data=await res.json()

let map={}
Object.entries(data).forEach(([k,arr])=>{
arr.forEach(p=>{
if(!map[p.ts])map[p.ts]={ts:p.ts}
map[p.ts][k]=num(p.value)
})
})

const rows=Object.values(map).sort((a,b)=>a.ts-b.ts)

document.getElementById("table").innerHTML=""

/* KPI */
let prod=0,run=0,down=0,idleT=0,energy=0
rows.forEach(r=>{
prod+=r.Production_Hourly||0
run+=r.Runtime_Hourly||0
down+=r.Downtime_Hourly||0
idleT+=r.Idletime_Hourly||0
energy+=r.Consumption_Hourly||0
})

production.innerText=prod.toFixed(0)
runtime.innerText=run.toFixed(1)
downtime.innerText=down.toFixed(1)
idle.innerText=idleT.toFixed(1)
energy.innerText=energy.toFixed(1)

/* TABLE */
rows.forEach(r=>{
document.getElementById("table").innerHTML+=`
<tr>
<td>${new Date(r.ts).toLocaleTimeString("en-IN")}</td>
<td>${r.Production_Hourly||0}</td>
<td>${r.Runtime_Hourly||0}</td>
<td>${r.Downtime_Hourly||0}</td>
<td>${r.Idletime_Hourly||0}</td>
<td>${r.Consumption_Hourly||0}</td>
<td>${r.Performance_Hourly||0}%</td>
</tr>`
})

/* DONUT */
function donut(id,val){
Plotly.newPlot(id,[{
values:[val,100-val],
type:"pie",
hole:.75,
marker:{colors:["#22c55e","#e5e7eb"]},
textinfo:"none"
}],{
annotations:[{text:val+"%",showarrow:false,font:{size:16}}],
showlegend:false,
height:150,width:150,
margin:{t:0,b:0,l:0,r:0}
})
}

const avg=k=>rows.length?rows.reduce((s,r)=>s+num(r[k]),0)/rows.length:0

donut("perf",avg("Performance_Hourly").toFixed(1))
donut("avail",avg("Availability_Hourly").toFixed(1))
donut("qual",avg("Quality_Hourly").toFixed(1))
donut("oeeChart",avg("Oee_Hourly").toFixed(1))

/* CHART */
Plotly.newPlot("prodChart",[{
x:rows.map(r=>new Date(r.ts)),
y:rows.map(r=>r.Production_Hourly),
mode:"lines+markers",
line:{color:"#2D8A6D"}
}])

Plotly.newPlot("energyChart",[{
x:rows.map(r=>new Date(r.ts)),
y:rows.map(r=>r.Consumption_Hourly),
mode:"lines+markers",
line:{color:"#f59e0b"}
}])

}

/* PDF */
async function downloadPDF(){
const {jsPDF}=window.jspdf
const canvas=await html2canvas(document.getElementById("report"),{scale:1})
const img=canvas.toDataURL("image/jpeg",0.7)

const pdf=new jsPDF()
pdf.addImage(img,"JPEG",0,0,210,canvas.height*210/canvas.width)
pdf.save("Revomac_Report.pdf")
}

document.getElementById("date").value=new Date().toISOString().split("T")[0]

</script>

</body>
</html>
